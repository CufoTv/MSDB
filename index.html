<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MSDB Guest Player</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background:#121212; color:#fff; }

  header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1rem 2rem;
    background:#1f1f1f;
    gap:1rem;
  }

  header h1 { font-size:1.5rem; color:#1db954; }
  header input {
    padding:.5rem 1rem;
    border-radius:20px;
    border:none;
    outline:none;
    width:220px;
    max-width:45vw;
  }

  main { display:flex; flex-wrap:wrap; padding:2rem; gap:2rem; }
  .playlist, .player { flex:1; min-width:300px; }

  .player {
    background:#1f1f1f;
    padding:1rem;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .player img {
    width:100%;
    border-radius:12px;
    max-height:300px;
    object-fit:cover;
    background:#0f0f0f;
  }

  .player h2 { margin-top:1rem; font-size:1.2rem; text-align:center; }
  .player h3 { font-size:1rem; color:#bbb; text-align:center; margin-bottom:1rem; }

  .controls {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:1rem;
    margin-top:1rem;
  }

  .controls button {
    background:#1db954;
    border:none;
    padding:.6rem .9rem;
    border-radius:50%;
    cursor:pointer;
    color:#fff;
    font-size:1.2rem;
    transition:.2s;
  }

  .controls button:hover { transform:scale(1.08); }

  .playlist h2 { margin-bottom:1rem; }

  .status {
    margin-bottom:1rem;
    padding:.75rem 1rem;
    border-radius:10px;
    background:#232323;
    color:#ddd;
    font-size:.95rem;
  }

  .status.error { color:#ffb3b3; border:1px solid #5a1e1e; }
  .status.ok { color:#b8f5c4; border:1px solid #1f5a2a; }

  .song-list {
    max-height:600px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:.5rem;
  }

  .song-item {
    background:#1a1a1a;
    padding:.75rem 1rem;
    border-radius:8px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:1rem;
    transition:.2s;
  }

  .song-item:hover { background:#333; }

  .song-item.active {
    outline:2px solid #1db954;
    background:#262626;
  }

  .song-item span {
    font-size:.9rem;
    color:#bbb;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .song-item .title {
    color:#fff;
    flex:1;
  }

  .ad-banner {
    margin:1rem 0;
    padding:1rem;
    background:#2a2a2a;
    border-radius:12px;
    text-align:center;
    color:#1db954;
    font-weight:bold;
    display:none;
  }

  #search { transition:.3s; }
  #search:focus { width:300px; }

  @media(max-width:800px){
    main { flex-direction:column; padding:1rem; }
    .playlist, .player { min-width:100%; }
    .player img { max-height:200px; }
    header { flex-direction:column; align-items:stretch; }
    header input { width:100%; max-width:none; }
  }
</style>
</head>
<body>

<header>
  <h1>MSDB Guest Player</h1>
  <input id="search" type="text" placeholder="Search songs, artists..." />
</header>

<main>
  <div class="playlist">
    <h2>Playlist</h2>
    <div id="status" class="status">Loading music...</div>
    <div id="ad" class="ad-banner">Ad Playing...</div>
    <div class="song-list" id="song-list"></div>
  </div>

  <div class="player">
    <img id="cover" src="" alt="Cover" />
    <h2 id="title">Select a song</h2>
    <h3 id="artist">...</h3>
    <div class="controls">
      <button id="prev" aria-label="Previous">&#9664;</button>
      <button id="play" aria-label="Play/Pause">&#9654;</button>
      <button id="next" aria-label="Next">&#9654;&#9654;</button>
    </div>
  </div>
</main>

<script type="module">
const player = new Audio();
let indexRef = { value: 0 };

const searchEl = document.getElementById("search");
const songListEl = document.getElementById("song-list");
const coverEl = document.getElementById("cover");
const titleEl = document.getElementById("title");
const artistEl = document.getElementById("artist");
const adEl = document.getElementById("ad");
const statusEl = document.getElementById("status");

let allSongs = [];
let viewSongs = [];
let ads = [];

function setStatus(message, type = "") {
  statusEl.textContent = message;
  statusEl.className = `status ${type}`.trim();
}

function normalizeArtists(value) {
  if (Array.isArray(value)) return value.filter(Boolean);
  if (typeof value === "string" && value.trim()) return [value.trim()];
  return [];
}

function normalizeSong(song, fallbackGroup = "") {
  return {
    ...song,
    title: song.title || song.name || "Untitled",
    artists: normalizeArtists(song.artists || song.artist || song.author),
    file: song.file || song.url || song.src || "",
    cover: song.cover || song.image || song.artwork || "",
    tags: Array.isArray(song.tags) ? song.tags : [],
    id: song.id ?? `${fallbackGroup}-${song.title || song.name || Math.random().toString(36).slice(2)}`
  };
}

async function fetchJson(path) {
  const res = await fetch(path, { cache: "no-store" });
  if (!res.ok) {
    throw new Error(`Failed to fetch ${path} (${res.status})`);
  }
  return await res.json();
}

async function fetchMusic() {
  const data = await fetchJson("./database/music.json");

  const list = [];

  if (Array.isArray(data.songs)) {
    data.songs.forEach(s => list.push(normalizeSong(s, "songs")));
  }

  if (Array.isArray(data.albums)) {
    data.albums
      .filter(a => a.enabled !== false)
      .forEach(album => {
        const albumTracks = Array.isArray(album.tracks) ? album.tracks : [];
        albumTracks
          .filter(t => t.enabled !== false)
          .forEach(track => {
            list.push(normalizeSong({ ...track, album: album.title || album.name }, album.title || "album"));
          });
      });
  }

  if (Array.isArray(data.eps)) {
    data.eps
      .filter(e => e.enabled !== false)
      .forEach(ep => {
        const epTracks = Array.isArray(ep.tracks) ? ep.tracks : [];
        epTracks
          .filter(t => t.enabled !== false)
          .forEach(track => {
            list.push(normalizeSong({ ...track, ep: ep.title || ep.name }, ep.title || "ep"));
          });
      });
  }

  if (Array.isArray(data.singles)) {
    data.singles
      .filter(s => s.enabled !== false)
      .forEach(single => list.push(normalizeSong(single, "single")));
  }

  return list.filter(song => song.file);
}

async function fetchAds() {
  try {
    const data = await fetchJson("./ads/ads.json");
    return Array.isArray(data) ? data.filter(a => a.enabled !== false) : [];
  } catch {
    return [];
  }
}

function renderSongs(list) {
  songListEl.innerHTML = "";

  if (!list.length) {
    songListEl.innerHTML = "";
    setStatus("No songs found in music.json. Check the JSON structure and file paths.", "error");
    return;
  }

  setStatus(`Loaded ${list.length} song(s).`, "ok");

  list.forEach((song, idx) => {
    const div = document.createElement("div");
    div.className = "song-item";
    div.dataset.index = String(idx);

    const artists = song.artists.length ? song.artists.join(", ") : "Unknown artist";

    div.innerHTML = `
      <span class="title">${song.title}</span>
      <span>${artists}</span>
    `;

    div.onclick = () => playSong(idx);
    songListEl.appendChild(div);
  });
}

function highlightActive() {
  document.querySelectorAll(".song-item").forEach(el => {
    el.classList.toggle("active", Number(el.dataset.index) === indexRef.value);
  });
}

async function playSong(idx) {
  if (!viewSongs.length) return;

  indexRef.value = idx;
  const song = viewSongs[idx];
  if (!song) return;

  highlightActive();

  // Guest-only ad chance
  if (ads.length > 0 && Math.random() < 0.3) {
    adEl.style.display = "block";
    player.pause();

    const adFile = ads[Math.floor(Math.random() * ads.length)]?.file;
    if (adFile) {
      const ad = new Audio(adFile);
      try {
        await ad.play();
      } catch {
        adEl.style.display = "none";
        startAudio(song);
        return;
      }
      ad.onended = () => {
        adEl.style.display = "none";
        startAudio(song);
      };
      return;
    }
  }

  startAudio(song);
}

function startAudio(song) {
  coverEl.src = song.cover || "";
  titleEl.textContent = song.title || "Untitled";
  artistEl.textContent = song.artists.length ? song.artists.join(", ") : "...";

  player.src = song.file;
  player.play().catch(() => {
    setStatus(`Unable to play: ${song.title}`, "error");
  });

  highlightActive();
}

function applySearch() {
  const query = searchEl.value.trim().toLowerCase();

  viewSongs = !query
    ? [...allSongs]
    : allSongs.filter(s => {
        const title = (s.title || "").toLowerCase();
        const artists = (s.artists || []).join(" ").toLowerCase();
        const tags = (s.tags || []).join(" ").toLowerCase();
        return title.includes(query) || artists.includes(query) || tags.includes(query);
      });

  renderSongs(viewSongs);
}

document.getElementById("play").onclick = () => {
  if (!player.src) {
    if (viewSongs.length) playSong(0);
    return;
  }
  player.paused ? player.play() : player.pause();
};

document.getElementById("next").onclick = () => {
  if (!viewSongs.length) return;
  playSong((indexRef.value + 1) % viewSongs.length);
};

document.getElementById("prev").onclick = () => {
  if (!viewSongs.length) return;
  playSong((indexRef.value - 1 + viewSongs.length) % viewSongs.length);
};

searchEl.addEventListener("input", applySearch);

player.addEventListener("ended", () => {
  if (!viewSongs.length) return;
  playSong((indexRef.value + 1) % viewSongs.length);
});

async function init() {
  try {
    setStatus("Loading music...", "");
    allSongs = await fetchMusic();
    ads = await fetchAds();

    viewSongs = [...allSongs];
    renderSongs(viewSongs);

    if (!viewSongs.length) {
      setStatus("No playable songs were found. Check database/music.json.", "error");
      return;
    }

    // Optional: preload first song info without autoplay
    const first = viewSongs[0];
    coverEl.src = first.cover || "";
    titleEl.textContent = first.title || "Select a song";
    artistEl.textContent = first.artists.length ? first.artists.join(", ") : "...";
  } catch (err) {
    console.error(err);
    setStatus(`Failed to load music.json: ${err.message}`, "error");
  }
}

init();
</script>
</body>
</html>
