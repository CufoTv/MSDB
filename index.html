<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSDB Guest Player</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
body { background:#121212; color:#fff; }

header { display:flex; justify-content:space-between; align-items:center; padding:1rem 2rem; background:#1f1f1f; }
header h1 { font-size:1.5rem; color:#1db954; }
header input { padding:.5rem 1rem; border-radius:20px; border:none; outline:none; width:200px; }

main { display:flex; flex-wrap:wrap; padding:2rem; gap:2rem; }
.playlist, .player { flex:1; min-width:300px; }

.player { background:#1f1f1f; padding:1rem; border-radius:12px; display:flex; flex-direction:column; align-items:center; }
.player img { width:100%; border-radius:12px; max-height:300px; object-fit:cover; }
.player h2 { margin-top:1rem; font-size:1.2rem; text-align:center; }
.player h3 { font-size:1rem; color:#bbb; text-align:center; margin-bottom:1rem; }
.controls { display:flex; justify-content:center; align-items:center; gap:1rem; margin-top:1rem; }
.controls button { background:#1db954; border:none; padding:.5rem 1rem; border-radius:50%; cursor:pointer; color:#fff; font-size:1.5rem; transition:.2s; }
.controls button:hover { transform:scale(1.1); }

.playlist h2 { margin-bottom:1rem; }
.song-list { max-height:600px; overflow-y:auto; display:flex; flex-direction:column; gap:.5rem; }
.song-item { background:#1a1a1a; padding:.5rem 1rem; border-radius:8px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; transition:0.2s; }
.song-item:hover { background:#333; }
.song-item span { font-size:.9rem; color:#bbb; }

.ad-banner { margin:1rem 0; padding:1rem; background:#2a2a2a; border-radius:12px; text-align:center; color:#1db954; font-weight:bold; }

#search { transition:.3s; }
#search:focus { width:300px; }

@media(max-width:800px){
  main { flex-direction:column; padding:1rem; }
  .playlist, .player { min-width:100%; }
  .player img { max-height:200px; }
}
</style>
</head>
<body>

<header>
  <h1>MSDB Guest Player</h1>
  <input id="search" type="text" placeholder="Search songs, artists...">
</header>

<main>
  <div class="playlist">
    <h2>Playlist</h2>
    <div id="ad" class="ad-banner" style="display:none;">Ad Playing...</div>
    <div class="song-list" id="song-list"></div>
  </div>

  <div class="player">
    <img id="cover" src="" alt="Cover">
    <h2 id="title">Select a song</h2>
    <h3 id="artist">...</h3>
    <div class="controls">
      <button id="prev">&#9664;</button>
      <button id="play">&#9654;</button>
      <button id="next">&#9654;&#9654;</button>
    </div>
  </div>
</main>

<script type="module">
import * as MSDB from './connect.js';

const player = new Audio();
let indexRef = { value:0 };

const searchEl = document.getElementById("search");
const songListEl = document.getElementById("song-list");
const coverEl = document.getElementById("cover");
const titleEl = document.getElementById("title");
const artistEl = document.getElementById("artist");
const adEl = document.getElementById("ad");

let songs = [];
let ads = [];

// ---------- FETCH MUSIC AND ADS ----------
async function fetchMusic(){
  const res = await fetch("/database/music.json");
  const data = await res.json();

  // Flatten all songs from albums, eps, and singles
  const list = [];
  data.albums.filter(a=>a.enabled).forEach(a=>{
    a.tracks.filter(t=>t.enabled).forEach(t=>list.push({...t, album:a.title}));
  });
  data.eps.filter(e=>e.enabled).forEach(e=>{
    e.tracks.filter(t=>t.enabled).forEach(t=>list.push({...t, ep:e.title}));
  });
  data.singles.filter(s=>s.enabled).forEach(s=>list.push(s));

  return list;
}

async function fetchAds(){
  const res = await fetch("/ads/ads.json");
  const data = await res.json();
  return data.filter(a=>a.enabled);
}

// Load songs and ads
songs = MSDB.ultraSmartShuffle(await fetchMusic());
ads = await fetchAds();
renderSongs(songs);

// ---------- RENDER SONG LIST ----------
function renderSongs(list){
  songListEl.innerHTML = "";
  list.forEach((song, idx)=>{
    const div = document.createElement("div");
    div.className = "song-item";
    div.innerHTML = `<span>${song.title}</span><span>${song.artists.join(", ")}</span>`;
    div.onclick = ()=>playSong(idx);
    songListEl.appendChild(div);
  });
}

// ---------- PLAY SONG ----------
async function playSong(idx){
  indexRef.value = idx;
  const song = songs[idx];

  // Guest ad system: 30% chance
  if(Math.random() < 0.3 && ads.length > 0){
    adEl.style.display = "block";
    player.pause();
    const ad = new Audio(ads[Math.floor(Math.random()*ads.length)].file);
    await ad.play();
    ad.onended = ()=> { adEl.style.display="none"; startAudio(song); }
  } else startAudio(song);
}

// ---------- START AUDIO ----------
function startAudio(song){
  coverEl.src = song.cover || "";
  titleEl.textContent = song.title;
  artistEl.textContent = song.artists.join(", ");
  player.src = song.file;
  player.play();

  MSDB.registerPlay(song);
  MSDB.saveHistory(song);
}

// ---------- AUTOPLAY ----------
MSDB.autoplay(player, songs, indexRef, "guest");

// ---------- PLAYER CONTROLS ----------
document.getElementById("play").onclick = ()=>player.paused?player.play():player.pause();
document.getElementById("next").onclick = ()=>playSong((indexRef.value+1)%songs.length);
document.getElementById("prev").onclick = ()=>playSong((indexRef.value-1+songs.length)%songs.length);

// ---------- SEARCH ----------
searchEl.addEventListener("input", e=>{
  const query = e.target.value.toLowerCase();
  renderSongs(songs.filter(s=>
    s.title.toLowerCase().includes(query) ||
    s.artists.join(" ").toLowerCase().includes(query) ||
    (s.tags && s.tags.join(" ").toLowerCase().includes(query))
  ));
});
</script>
</body>
</html>
